version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# AI Trader Bot - Docker Compose
#
# This file defines all the services that make up the bot.
# Run everything with: docker-compose up -d
# Stop everything with: docker-compose down
# View logs with:       docker-compose logs -f
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Main Trading Bot ────────────────────────────────────────────────────────
  forex-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-trader-bot
    restart: unless-stopped
    environment:
      - IG_API_KEY=${IG_API_KEY}
      - IG_ACCOUNT_ID=${IG_ACCOUNT_ID}
      - IG_USERNAME=${IG_USERNAME}
      - IG_PASSWORD=${IG_PASSWORD}
      - IG_ENVIRONMENT=${IG_ENVIRONMENT}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - INSTANCE_ID=primary
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      - mcp-server
    networks:
      - forex-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── MCP Analysis Server ─────────────────────────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: ai-trader-mcp
    restart: unless-stopped
    environment:
      - IG_API_KEY=${IG_API_KEY}
      - IG_ACCOUNT_ID=${IG_ACCOUNT_ID}
      - IG_USERNAME=${IG_USERNAME}
      - IG_PASSWORD=${IG_PASSWORD}
      - IG_ENVIRONMENT=${IG_ENVIRONMENT}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./data:/app/data
    ports:
      - "8090:8090"
    networks:
      - forex-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Health Monitor ──────────────────────────────────────────────────────────
  health-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-trader-health
    restart: unless-stopped
    environment:
      - IG_API_KEY=${IG_API_KEY}
      - IG_ACCOUNT_ID=${IG_ACCOUNT_ID}
      - IG_USERNAME=${IG_USERNAME}
      - IG_PASSWORD=${IG_PASSWORD}
      - IG_ENVIRONMENT=${IG_ENVIRONMENT}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: ["python", "-m", "scripts.health_monitor"]
    depends_on:
      - forex-bot
      - mcp-server
    networks:
      - forex-network

networks:
  forex-network:
    driver: bridge

volumes:
  data:
  logs: