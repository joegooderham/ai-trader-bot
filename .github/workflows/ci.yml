name: AI Trader Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rebuild and start bot
        working-directory: C:\DevOps\AI_Trading\ai-trader-bot
        env:
          IG_API_KEY: ${{ secrets.IG_API_KEY }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_ENVIRONMENT: ${{ secrets.IG_ENVIRONMENT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docker-compose down
          docker-compose build
          docker-compose up -d