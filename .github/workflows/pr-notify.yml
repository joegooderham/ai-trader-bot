name: PR Telegram Notification

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  notify:
    runs-on: ubuntu-latest
    # Skip draft PRs — only notify when ready for review
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and send Telegram notification
        env:
          TELEGRAM_BOT_SYS_TOKEN: ${{ secrets.TELEGRAM_BOT_SYS_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Gather PR details from the event payload
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          PR_BASE="${{ github.event.pull_request.base.ref }}"

          # Get changed files summary using the GitHub API
          FILES_JSON=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER}/files --jq '.[].filename')
          FILE_COUNT=$(echo "$FILES_JSON" | wc -l)

          # Group changed files by top-level directory for a clean summary
          FILE_SUMMARY=$(echo "$FILES_JSON" | sed 's|/.*||' | sort | uniq -c | sort -rn | head -8 | while read count dir; do
            echo "   📂 ${dir}/ — ${count} file(s)"
          done)

          # If there are more than 8 directories, note the remainder
          DIR_COUNT=$(echo "$FILES_JSON" | sed 's|/.*||' | sort -u | wc -l)
          if [ "$DIR_COUNT" -gt 8 ]; then
            REMAINING=$((DIR_COUNT - 8))
            FILE_SUMMARY="${FILE_SUMMARY}
             ...and ${REMAINING} more directories"
          fi

          # Build the Telegram message with clean emoji formatting
          MESSAGE="🔔 *New Pull Request*

          📌 *${PR_TITLE}*
          👤 Raised by: \`${PR_AUTHOR}\`
          🔀 \`${PR_BRANCH}\` → \`${PR_BASE}\`

          📊 *Files Changed:* ${FILE_COUNT} file(s)
          ${FILE_SUMMARY}

          👉 [Review & Merge on GitHub](${PR_URL})"

          # Remove leading whitespace from heredoc-style indentation
          MESSAGE=$(echo "$MESSAGE" | sed 's/^          //')

          # Send via system bot only (keeps PR notifications in the ops channel)
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_SYS_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true"
