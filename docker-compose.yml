# ─────────────────────────────────────────────────────────────────────────────
# AI Trader Bot - Docker Compose
# ─────────────────────────────────────────────────────────────────────────────

services:

  forex-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-trader-bot
    restart: unless-stopped
    environment:
      - IG_API_KEY=${IG_API_KEY}
      - IG_ACCOUNT_ID=${IG_ACCOUNT_ID}
      - IG_USERNAME=${IG_USERNAME}
      - IG_PASSWORD=${IG_PASSWORD}
      - IG_ENVIRONMENT=${IG_ENVIRONMENT}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      - mcp-server
    networks:
      - forex-network

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: ai-trader-mcp
    restart: unless-stopped
    environment:
      - IG_API_KEY=${IG_API_KEY}
      - IG_ACCOUNT_ID=${IG_ACCOUNT_ID}
      - IG_USERNAME=${IG_USERNAME}
      - IG_PASSWORD=${IG_PASSWORD}
      - IG_ENVIRONMENT=${IG_ENVIRONMENT}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./data:/app/data
    ports:
      - "8090:8090"
    networks:
      - forex-network

  health-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-trader-health
    restart: unless-stopped
    environment:
      - IG_API_KEY=${IG_API_KEY}
      - IG_ACCOUNT_ID=${IG_ACCOUNT_ID}
      - IG_USERNAME=${IG_USERNAME}
      - IG_PASSWORD=${IG_PASSWORD}
      - IG_ENVIRONMENT=${IG_ENVIRONMENT}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: ["python", "-m", "scripts.health_monitor"]
    depends_on:
      - forex-bot
      - mcp-server
    networks:
      - forex-network

networks:
  forex-network:
    driver: bridge

volumes:
  data:
  logs: