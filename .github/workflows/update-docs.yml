name: Auto-Update Documentation

# Runs after CI deploys — analyses code changes and updates docs
# Uses Claude API to intelligently update only affected documentation

on:
  workflow_run:
    workflows: ["AI Trader Bot"]  # Runs after the main CI workflow completes
    types: [completed]
    branches: [main]
  workflow_dispatch:  # Manual trigger for testing

jobs:
  update-docs:
    runs-on: self-hosted
    # Only run if the triggering workflow succeeded (or manual dispatch)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for code changes (skip if only .md files changed)
        id: check
        shell: pwsh
        run: |
          $changed = git diff --name-only HEAD~1 HEAD 2>$null
          $codeChanged = $changed | Where-Object { $_ -notmatch '\.md$' }
          if (-not $codeChanged) {
            "skip=true" >> $env:GITHUB_OUTPUT
            Write-Host "Only markdown changes - skipping doc update"
          } else {
            "skip=false" >> $env:GITHUB_OUTPUT
            Write-Host "Code changes detected - will update docs"
          }

      - name: Skip if last commit was from docs-bot
        id: check_bot
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $lastMsg = git log -1 --pretty=%s
          if ($lastMsg -match '\[docs-bot\]') {
            "skip=true" >> $env:GITHUB_OUTPUT
            Write-Host "Last commit was from docs-bot - skipping to avoid loop"
          } else {
            "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Run documentation updater via Docker
        if: steps.check.outputs.skip != 'true' && steps.check_bot.outputs.skip != 'true'
        shell: pwsh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docker run --rm `
            -v "${PWD}:/app" `
            -w /app `
            -e ANTHROPIC_API_KEY=$env:ANTHROPIC_API_KEY `
            python:3.11-slim `
            sh -c "apt-get update -qq && apt-get install -y -qq git >/dev/null 2>&1 && pip install -q anthropic && python -m scripts.update_docs"

      - name: Commit and push README/CLAUDE.md changes
        if: steps.check.outputs.skip != 'true' && steps.check_bot.outputs.skip != 'true'
        shell: pwsh
        run: |
          $diff = git diff --name-only -- '*.md'
          if (-not $diff) {
            Write-Host "No documentation changes to commit"
            exit 0
          }
          git config user.name "docs-bot"
          git config user.email "docs-bot@users.noreply.github.com"
          git add -- '*.md'
          git commit -m "[docs-bot] Auto-update documentation from code changes"
          git push origin main
