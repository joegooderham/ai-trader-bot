# ─────────────────────────────────────────────────────────────────────────────
# AI Trader Bot - Docker Compose
# ─────────────────────────────────────────────────────────────────────────────

services:

  forex-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-trader-bot
    restart: unless-stopped
    environment:
      - IG_API_KEY=${IG_API_KEY}
      - IG_ACCOUNT_ID=${IG_ACCOUNT_ID}
      - IG_USERNAME=${IG_USERNAME}
      - IG_PASSWORD=${IG_PASSWORD}
      - IG_ENVIRONMENT=${IG_ENVIRONMENT}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_SYS_TOKEN=${TELEGRAM_BOT_SYS_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./data_store:/app/data_store
      - ./logs:/app/logs
      - ./config:/app/config
      - ./.git:/app/.git:ro
    depends_on:
      - mcp-server
    networks:
      - forex-network

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: ai-trader-mcp
    restart: unless-stopped
    environment:
      - IG_API_KEY=${IG_API_KEY}
      - IG_ACCOUNT_ID=${IG_ACCOUNT_ID}
      - IG_USERNAME=${IG_USERNAME}
      - IG_PASSWORD=${IG_PASSWORD}
      - IG_ENVIRONMENT=${IG_ENVIRONMENT}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_SYS_TOKEN=${TELEGRAM_BOT_SYS_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./data_store:/app/data_store
    ports:
      - "8090:8090"
    networks:
      - forex-network

  health-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-trader-health
    restart: unless-stopped
    environment:
      - IG_API_KEY=${IG_API_KEY}
      - IG_ACCOUNT_ID=${IG_ACCOUNT_ID}
      - IG_USERNAME=${IG_USERNAME}
      - IG_PASSWORD=${IG_PASSWORD}
      - IG_ENVIRONMENT=${IG_ENVIRONMENT}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_SYS_TOKEN=${TELEGRAM_BOT_SYS_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: ["python", "-m", "scripts.health_monitor"]
    depends_on:
      - forex-bot
      - mcp-server
    networks:
      - forex-network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: ai-trader-dashboard
    restart: unless-stopped
    environment:
      - MCP_SERVER_URL=http://mcp-server:8090
      - DB_PATH=/app/data_store/trades.db
      - CONFIG_PATH=/app/config/config.yaml
      - WIKI_REPO_URL=https://github.com/joegooderham/ai-trader-bot.wiki.git
    volumes:
      - ./data_store:/app/data_store:ro
      - ./config:/app/config:ro
    ports:
      - "8050:8050"
    depends_on:
      - mcp-server
    networks:
      - forex-network

networks:
  forex-network:
    driver: bridge

volumes:
  data:
  logs: