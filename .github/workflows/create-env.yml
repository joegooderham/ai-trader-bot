name: Create .env file

on:
  workflow_dispatch:

jobs:
  create-env:
    runs-on: self-hosted
    steps:
      - name: Write .env from GitHub Secrets
        working-directory: C:\DevOps\AI_Trading\ai-trader-bot
        shell: pwsh
        env:
          IG_API_KEY: ${{ secrets.IG_API_KEY }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_ENVIRONMENT: ${{ secrets.IG_ENVIRONMENT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          @"
          # Auto-generated from GitHub Secrets — do not commit
          IG_API_KEY=$env:IG_API_KEY
          IG_USERNAME=$env:IG_USERNAME
          IG_PASSWORD=$env:IG_PASSWORD
          IG_ACCOUNT_ID=$env:IG_ACCOUNT_ID
          IG_ENVIRONMENT=$env:IG_ENVIRONMENT
          TELEGRAM_BOT_TOKEN=$env:TELEGRAM_BOT_TOKEN
          TELEGRAM_CHAT_ID=$env:TELEGRAM_CHAT_ID
          ANTHROPIC_API_KEY=$env:ANTHROPIC_API_KEY
          MAX_CAPITAL=500
          MIN_CONFIDENCE_SCORE=60
          HOLD_OVERNIGHT_THRESHOLD=98
          DATA_DIR=/app/data
          "@ | Set-Content -Path .env -Encoding UTF8

          Write-Host ".env file created successfully"
