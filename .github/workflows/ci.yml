name: AI Trader Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rebuild and start bot
        working-directory: C:\DevOps\AI_Trading\ai-trader-bot
        env:
          IG_API_KEY: ${{ secrets.IG_API_KEY }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_ENVIRONMENT: ${{ secrets.IG_ENVIRONMENT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_SYS_TOKEN: ${{ secrets.TELEGRAM_BOT_SYS_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
          GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          FRED_API_TOKEN: ${{ secrets.FRED_API_TOKEN }}
          DASHBOARD_CMD_TOKEN: ${{ secrets.DASHBOARD_CMD_TOKEN }}
          DASHBOARD_OWNER_EMAIL: ${{ secrets.DASHBOARD_OWNER_EMAIL }}
        run: |
          docker-compose up -d --build